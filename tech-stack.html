<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Juliane Cyruz Diaz | Tech Stack</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="style.css" rel="stylesheet">
  <style>
    body {
      font-family: "Inter", sans-serif;
    }
  </style>
</head>
<body class="bg-[#0f0f10] text-[#ddd] flex min-h-screen flex-col md:flex-row">
  <div class="sticky top-0 h-auto md:h-screen w-full md:w-[230px] bg-[#141416] border-b md:border-b-0 md:border-r border-[#2a2a2a] p-4 md:p-5 flex flex-row md:flex-col items-center justify-between md:justify-center gap-4 z-50">
    <a href="index.html" class="block transition hover:scale-105 active:scale-95">
      <div class="w-20 h-20 bg-[#2a2a2a] rounded-[14px] flex items-center justify-center border border-[#333] overflow-hidden">
        <img src="images/background/logo.png" alt="Logo" class="w-full h-full object-cover" />
      </div>
    </a>
    <input type="checkbox" id="nav-toggle" class="peer hidden" />
    <label for="nav-toggle" class="md:hidden cursor-pointer flex flex-col gap-1.5">
      <span class="block w-6 h-0.5 bg-[#bbb] transition-all peer-checked:rotate-45 peer-checked:translate-y-2"></span>
      <span class="block w-6 h-0.5 bg-[#bbb] transition-all peer-checked:opacity-0"></span>
      <span class="block w-6 h-0.5 bg-[#bbb] transition-all peer-checked:-rotate-45 peer-checked:-translate-y-2"></span>
    </label>
    <div class="hidden peer-checked:flex md:flex flex-col items-center gap-4 absolute md:static top-full left-0 w-full bg-[#141416] md:bg-transparent p-5 md:p-0 border-b border-[#2a2a2a] md:border-none">
      <div class="text-base font-bold text-[#ff3b3b] hidden md:block">
        Menu
      </div>
      <div class="flex flex-col items-center gap-3 md:gap-2">
        <a href="index.html" class="text-sm text-[#bbb] hover:text-[#ff3b3b] transition hover:translate-x-1">Home</a>
        <a href="about.html" class="text-sm text-[#bbb] hover:text-[#ff3b3b] transition hover:translate-x-1">About</a>
        <a href="tech-stack.html" class="text-sm text-[#ff3b3b] transition hover:translate-x-1">Tech Stack</a>
        <a href="certifications.html" class="text-sm text-[#bbb] hover:text-[#ff3b3b] transition hover:translate-x-1">Certifications</a>
      </div>
    </div>
  </div>
  <div class="ml-auto md:ml-0 md:absolute md:top-4 md:right-4 z-10">
    <label for="switch" class="switch">
      <input id="switch" type="checkbox" />
      <span class="slider"></span>
      <span class="decoration"></span>
    </label>
  </div>
  <div class="flex-1 flex items-center justify-center p-5 md:p-10">
    <div class="w-full max-w-[750px] rounded-[50px] border border-[#2a2a2a] p-8 md:p-12 bg-[linear-gradient(rgba(20,20,22,0.92),rgba(20,20,22,0.92)),url('images/background/persona.png')] bg-cover bg-center text-center">
      <h1 class="text-lg md:text-3xl font-bold text-[#ff3b3b] inline-block px-6 py-3 rounded-full shadow-md mb-10">
        Languages
      </h1>
      <div class="grid grid-cols-2 md:grid-cols-3 gap-6 max-w-[750px] mx-auto">
        <div class="bg-white/5 rounded-xl p-4 border border-white/10 flex flex-col items-center transition duration-300 hover:scale-105 hover:shadow-[0_0_20px_rgba(255,59,59,0.4)]">
          <div class="w-12 h-12 flex items-center justify-center">
            <img src="images/tech-stack/html.png" class="w-full h-full object-contain" alt="HTML">
          </div>
          <p class="text-sm mt-2">HTML</p>
        </div>
        <div class="bg-white/5 rounded-xl p-4 border border-white/10 flex flex-col items-center transition duration-300 hover:scale-105 hover:shadow-[0_0_20px_rgba(255,59,59,0.4)]">
          <div class="w-12 h-12 flex items-center justify-center">
            <img src="images/tech-stack/css.png" class="w-full h-full object-contain" alt="CSS">
          </div>
          <p class="text-sm mt-2">CSS</p>
        </div>
        <div class="bg-white/5 rounded-xl p-4 border border-white/10 flex flex-col items-center transition duration-300 hover:scale-105 hover:shadow-[0_0_20px_rgba(255,59,59,0.4)]">
          <div class="w-12 h-12 flex items-center justify-center">
            <img src="images/tech-stack/c.png" class="w-full h-full object-contain" alt="C">
          </div>
          <p class="text-sm mt-2">C</p>
        </div>
        <div class="bg-white/5 rounded-xl p-4 border border-white/10 flex flex-col items-center transition duration-300 hover:scale-105 hover:shadow-[0_0_20px_rgba(255,59,59,0.4)]">
          <div class="w-12 h-12 flex items-center justify-center">
            <img src="images/tech-stack/java.png" class="w-full h-full object-contain" alt="Java">
          </div>
          <p class="text-sm mt-2">Java</p>
        </div>
        <div class="bg-white/5 rounded-xl p-4 border border-white/10 flex flex-col items-center transition duration-300 hover:scale-105 hover:shadow-[0_0_20px_rgba(255,59,59,0.4)]">
          <div class="w-12 h-12 flex items-center justify-center">
            <img src="images/tech-stack/MySQL.png" class="w-full h-full object-contain" alt="MySQL">
          </div>
          <p class="text-sm mt-2">MySQL</p>
        </div>
        <div class="bg-white/5 rounded-xl p-4 border border-white/10 flex flex-col items-center transition duration-300 hover:scale-105 hover:shadow-[0_0_20px_rgba(255,59,59,0.4)]">
          <div class="w-12 h-12 flex items-center justify-center">
            <img src="images/tech-stack/postgre.png" class="w-full h-full object-contain" alt="PostgreSQL">
          </div>
          <p class="text-sm mt-2">PostgreSQL</p>
        </div>
      </div>
      <h1 class="text-lg md:text-3xl font-bold text-[#ff3b3b] inline-block px-6 py-3 rounded-full shadow-md mt-14 mb-10">
        Tools
      </h1>
      <div class="grid grid-cols-2 md:grid-cols-3 gap-6 max-w-[750px] mx-auto">
        <div class="bg-white/5 rounded-xl p-4 border border-white/10 flex flex-col items-center transition duration-300 hover:scale-105 hover:shadow-[0_0_20px_rgba(255,59,59,0.4)]">
          <div class="w-12 h-12 flex items-center justify-center">
            <img src="images/tech-stack/VsCode.png" class="w-full h-full object-contain" alt="VS Code">
          </div>
          <p class="text-sm mt-2">VS Code</p>
        </div>
        <div class="bg-white/5 rounded-xl p-4 border border-white/10 flex flex-col items-center transition duration-300 hover:scale-105 hover:shadow-[0_0_20px_rgba(255,59,59,0.4)]">
          <div class="w-12 h-12 flex items-center justify-center">
            <img src="images/tech-stack/Git.png" class="w-full h-full object-contain" alt="Git">
          </div>
          <p class="text-sm mt-2">Git</p>
        </div>
        <div class="bg-white/5 rounded-xl p-4 border border-white/10 flex flex-col items-center transition duration-300 hover:scale-105 hover:shadow-[0_0_20px_rgba(255,59,59,0.4)]">
          <div class="w-12 h-12 flex items-center justify-center">
            <img src="images/tech-stack/githubwhite.png" class="w-full h-full object-contain" alt="GitHub">
          </div>
          <p class="text-sm mt-2">GitHub</p>
        </div>
      </div>
    </div>
  </div>

</html>
