<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Juliane Cyruz Diaz | Home</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin: 0;
padding: 0;
box-sizing: border-box;
}

body {
font-family: "Inter", sans-serif;
background: #0f0f10;
color: #ddd;
display: flex;
min-height: 100vh;
}

/* SIDEBAR */
.sidebar {
position: sticky;
top: 0;
height: 100vh;
width: 230px;
background: #141416;
border-right: 1px solid #2a2a2a;
padding: 20px;

display: flex;
flex-direction: column;
justify-content: center;
align-items: center;
gap: 15px;

flex-shrink: 0;
}

.sidebar-logo {
width: 80px;
height: 80px;
background: #2a2a2a;
border-radius: 14px;
display: flex;
align-items: center;
justify-content: center;
font-size: 12px;
color: #777;
border: 1px solid #333;
}

.sidebar-title {
font-size: 16px;
font-weight: 700;
color: #ff3b3b;
}

.nav-group {
display: flex;
flex-direction: column;
align-items: center;
gap: 8px;
}

.nav-link {
font-size: 14px;
color: #bbb;
transition: 0.2s;
}

.nav-link:hover {
color: #ff3b3b;
transform: translateX(3px);
}

/* MAIN */
.page-content {
flex: 1;
display: flex;
align-items: center;
justify-content: center;
padding: 40px;
}

.profile-card {
background: 
linear-gradient(rgba(20,20,22,0.85), rgba(20,20,22,0.85)),
url("images/background/persona.png");
border: 1px solid #2a2a2a;
border-radius: 18px;
padding: 40px 30px;
width: 100%;
max-width: 850px;
text-align: center;
}

.profile-image {
width: 240px;
height: 240px;
border-radius: 50%;
object-fit: cover;
border: 4px solid #2a2a2a;
margin-bottom: 25px;
}

.profile-name {
font-size: 32px;
font-weight: 700;
color: #ff3b3b;
margin-bottom: 8px;
}

.profile-role {
font-size: 14px;
color: #aaa;
}

/* MOBILE */
@media (max-width: 768px) {
body {
flex-direction: column;
}

.sidebar {
width: 100%;
height: auto;

flex-direction: row;
justify-content: space-between;
align-items: center;

padding: 15px 20px;
}

.nav-group {
flex-direction: row;
gap: 12px;
}

.sidebar-logo {
margin-right: auto;
}

.sidebar-title {
display: none;
}

.page-content {
padding: 20px;
}
}
</style>

</head>

<body>

<div class="sidebar">

<div class="sidebar-logo">Logo</div>

<div class="sidebar-title">Menu</div>

<div class="nav-group">
<a class="nav-link" href="index.html">Home</a>
<a class="nav-link" href="about.html">About</a>
<a class="nav-link" href="techstack.html">Tech Stack</a>
<a class="nav-link" href="certifications.html">Certifications</a>
</div>

</div>

<div class="page-content">

<div class="profile-card">

<img src="images/jisi.png" alt="profile" class="profile-image">

<div class="profile-name">Juliane Cyruz Diaz</div>
<div class="profile-role">IT Student • SDCA • Database</div>

</div>

</div>

</body>
</html>
