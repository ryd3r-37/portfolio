<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Certifications</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-[#f1e2cc]"></body>
    <div class="page">
        <nav class="p-4">
            <a href="index.html" class="px-3 py-2">Home</a>
            <a href="about.html" class="px-3 py-2">About</a>
            <a href="techstack.html" class="px-3 py-2">Tech Stack</a>
            <a href="certifications.html" class="px-3 py-2 font-bold">Certifications</a>
        </nav>

        <section class="py-10">
            <div class="flex flex-wrap justify-center gap-10">
                
                <div class="w-full sm:w-1/2 md:w-5/12 lg:w-1/3 p-6 text-center bg-[#2E1B0E] rounded-xl hover:scale-105 transition-transform shadow-xl">
                    <img src="img/CertWord_page-0001.jpg" 
                         class="w-full rounded-xl cursor-pointer" 
                         onclick="openModal(this.src)" 
                         alt="MS Word Certificate">
                    <p class="font-bold text-white pt-4 pb-2 text-2xl">MS Word Associate</p>
                    <a href="https://www.certiport.com/portal/pages/credentialverification.aspx"
                       target="_blank" 
                       class="inline-block mt-4 px-6 py-2 bg-[#f1e2cc] text-black font-semibold rounded-lg hover:bg-[#6EC471] transition">
                       Verify certificate
                    </a>
                </div>

                
                <div class="w-full sm:w-1/2 md:w-5/12 lg:w-1/3 p-6 text-center bg-[#2E1B0E] rounded-xl hover:scale-105 transition-transform shadow-xl">
                    <img src="img/CertJava_page-0001.jpg" 
                         class="w-full rounded-xl cursor-pointer" 
                         onclick="openModal(this.src)" 
                         alt="Java Specialist Certificate">
                    <p class="font-bold text-white pt-4 pb-2 text-2xl">Specialist in Java</p>
                    <a href="https://www.certiport.com/portal/pages/credentialverification.aspx"
                       target="_blank" 
                       class="inline-block mt-4 px-6 py-2 bg-[#f1e2cc] text-black font-semibold rounded-lg hover:bg-[#6EC471] transition">
                       Verify certificate
                    </a>
                </div>
            </div>
        </section>
    </div>
</body>
</html>
