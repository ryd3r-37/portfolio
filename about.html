<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Juliane Cyruz Diaz | Web Portfolio</title>
        <style>
        /* body styles */
        body {
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            min-height: 100vh;
            padding: 1.5rem;
            line-height: 1.6;
            background: #f1e2cc; /* nice beige */
            color: #2f2b27;
        }
        .page {
            max-width: 900px;
            margin: 0 auto; /* centers the page */
        }
        nav {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
            background: #fff;
            border: 1px solid #d6bfa7;
            padding: 0.75rem 1rem;
            border-radius: 0.5rem;
        }
        nav a {
            color: #2f2b27;
            text-decoration: none;
            padding: 0.6rem 1rem;
            border-radius: 0.5rem;
            background: #efe0d2;
            transition: background 0.2s ease; /* hover effect */
        }
        nav a:hover {
            background: #e1c9b0;
        }
        .hero {
            display: flex;
            flex-wrap: wrap;
            gap: 1.5rem;
            align-items: center;
            margin-top: 1.5rem; /* space from nav */
        }
        .profile-photo {
            width: 150px;
            height: 150px;
            object-fit: cover;
            border-radius: 50%;
            border: 1px solid #d6bfa7;
            background: #fff; /* fallback */
        }
        h1 {
            margin: 0;
            font-size: 2rem; /* title size */
        }
        section {
            margin-top: 1.5rem;
            padding: 1rem;
            background: #fff;
            border-radius: 0.5rem;
            border: 1px solid #e1cdbe; /* subtle border */
        }
    </style>
    </head>
    <body>
        <div class="page">
            <nav>
                <a href="Untitled-1.html">About Me</a>
                <a href="Untitled-2.html">Certifications</a>
                <a href="socials.html">Socials</a>
            </nav>
            <div class="hero">
                <img src="me.jpg" alt="Juliane Cyruz Diaz" class="profile-photo">
                <div>
                    <h1>About Me</h1>
                    <p>Hello, my name is Juliane Cyruz Diaz.</p>
                </div>
            </div>
            <section>
                <h2>What do I do in school and outside school?</h2>
                <p>I do music and sing a lot. I also play games and enjoy creative activities.</p>
                <p>In school, I like expressing myself through different activities and sharing my ideas.</p>
            </section>
        </div>
    </body>
</html>
